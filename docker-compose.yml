services:
  sticker:
    image: ghcr.io/catsec/signal-animated-sticker-maker:latest
    container_name: sticker
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,size=256m,mode=1777
    volumes:
      - sticker_work:/work

    environment:
      WORK_DIR: /work
      MAX_UPLOAD_MB: "100"
      MAX_PIXELS: "40000000"
      MAX_EDGE: "8192"
      MAX_CONCURRENT: "2"
      QUEUE_TIMEOUT_S: "20"
      SESSION_TTL_MIN: "20"
      STEP_TIMEOUT_S: "60"
      MIN_FREE_MB: "512"
    
    ports:
      - "8001:8001"          # app listens on 8001 (see Dockerfile); no remapping

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:   { cpus: "2.0", memory: 1g }
        reservations: { cpus: "0.5", memory: 256m }

    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  sticker_work:

networks:
  edge:
    external: true
