# Signal Sticker Studio — hardened, multi-session.
#
# Runs STANDALONE — no tunnel required:
#     docker compose up -d --build      ->  http://127.0.0.1:8765
#
# This app has NO built-in auth, so the published port defaults to localhost only.
# Pick whichever exposure you need (the tunnel is entirely optional):
#   * Same machine ......... leave defaults                  -> http://127.0.0.1:8765
#   * LAN / direct access ... STICKER_BIND=0.0.0.0 docker compose up -d
#                             (anyone who can reach the host:port can use it — no auth)
#   * Custom host port ..... STICKER_PORT=9000 docker compose up -d
#   * Behind a tunnel / reverse proxy (e.g. Cloudflare Access): you don't even need a
#     published port — join your proxy's network (see the optional `networks` blocks
#     below) and point the proxy at  http://sticker:8000 . Keep MAX_UPLOAD_MB <= your
#     proxy/plan request-body limit (Cloudflare free = 100 MB).
services:
  sticker:
    build: .
    image: signal-sticker:1.1
    container_name: signal-sticker

    # ---- least privilege ----
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true        # default seccomp + AppArmor stay enabled
    cap_drop:
      - ALL                           # listens on 8000 (>1024); no caps needed

    # ---- writable surfaces only ----
    tmpfs:
      - /tmp:rw,size=256m,mode=1777    # gunicorn worker tmp + $HOME scratch
    volumes:
      - sticker_work:/work             # sessions/uploads/output (disk, not RAM)

    # ---- input & resource limits (strict; tune as a set) ----
    environment:
      WORK_DIR: /work
      MAX_UPLOAD_MB: "100"             # hard upload cap -> clean 413
      MAX_PIXELS: "40000000"           # ~40 MP per frame
      MAX_EDGE: "8192"                 # max width/height
      MAX_CONCURRENT: "2"              # simultaneous conversions (pair with cpus)
      QUEUE_TIMEOUT_S: "20"            # wait for a slot, else 429
      SESSION_TTL_MIN: "20"            # reaper age
      STEP_TIMEOUT_S: "60"            # per-ffmpeg/pngquant timeout -> 504
      MIN_FREE_MB: "512"               # reject uploads when storage is low -> 503

    # Host bind defaults to localhost (safe, since there's no auth). Override
    # STICKER_BIND=0.0.0.0 for LAN access, or STICKER_PORT to change the host port.
    # If you reach it only via a tunnel on a shared network, you can delete this block.
    ports:
      - "${STICKER_BIND:-127.0.0.1}:${STICKER_PORT:-8765}:8000"

    # ---- optional: join an existing reverse-proxy / tunnel network ----
    # Create it once (`docker network create edge`), uncomment the two lines below and
    # the top-level `networks:` block at the bottom, then point your proxy at
    # http://sticker:8000 (the `ports:` mapping above then becomes optional).
    # networks:
    #   - edge

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:   { cpus: "2.0", memory: 1g }
        reservations: { cpus: "0.5", memory: 256m }
    # Non-swarm / older Compose fallback (uncomment if `deploy` is ignored):
    # mem_limit: 1g
    # cpus: 2.0

    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  sticker_work:

# ---- optional: shared external network for a tunnel / reverse proxy ----
# networks:
#   edge:
#     external: true
